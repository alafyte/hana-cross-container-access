_schema-version: "2.1"
ID: hana-learning-cross-container
version: 0.0.1
modules:
- name: db
  type: hdb
  path: db
  requires:
  - name: hdi_db
    properties:
      TARGET_CONTAINER: ~{hdi-container-name}
  - name: cross-container-service-1
    group: SERVICE_REPLACEMENTS
    properties:
      key: ServiceName_1
      service: ~{the-service-name}
- name: db_analytics
  type: hdb
  path: db_analytics
  requires:
  - name: hdi_db_analytics
    properties:
      TARGET_CONTAINER: ~{hdi-container-name}
  - name: cross-container-service-2
    group: SERVICE_REPLACEMENTS
    properties:
      key: ServiceName_1
      service: ~{the-service-name}
resources:
- name: hdi_db
  type: com.sap.xs.hdi-container
  properties:
    hdi-container-name: ${service-name}
- name: cross-container-service-1
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: ""
  properties:
    the-service-name: ${service-name}
- name: hdi_db_analytics
  type: com.sap.xs.hdi-container
  properties:
    hdi-container-name: ${service-name}
- name: cross-container-service-2
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: hana-learning-cross-container-hdidb-ws-a7wtq
  properties:
    the-service-name: ${service-name}
